/* ─── Page-specific styles ──────────────────────────────────────────────── */
.products-hero {
  padding: 7rem 0 4rem;
  text-align: center;
}
.products-hero h1 {
  font-size: clamp(2rem, 4vw, 3rem);
  font-weight: 700;
  line-height: 1.15;
  margin: 0.75rem 0 1rem;
}
.products-hero p {
  max-width: 600px;
  margin: 0 auto;
  color: var(--text-secondary);
  font-size: 1.05rem;
  line-height: 1.7;
}

/* ─── Card Grid ─────────────────────────────────────────────────────────── */
.products-grid-section {
  padding: 3rem 0 6rem;
}
.prod-grid-top {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1.25rem;
  margin-bottom: 1.25rem;
}
.prod-grid-bottom {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 1.25rem;
}

.prod-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
  display: flex;
  flex-direction: column;
}
.prod-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 16px 48px rgba(0,0,0,0.3), 0 0 0 1px var(--border-accent);
  border-color: var(--border-accent);
}

.prod-card-img {
  aspect-ratio: 16/9;
  background: var(--bg-elevated);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.prod-card-img svg {
  width: 48px;
  height: 48px;
  opacity: 0.2;
}

.prod-card-body {
  padding: 1.5rem;
  display: flex;
  flex-direction: column;
  flex: 1;
}
.prod-card-tag {
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--accent);
  margin-bottom: 0.5rem;
}
.prod-card-body h3 {
  font-size: 1.3rem;
  font-weight: 700;
  margin-bottom: 0.5rem;
  letter-spacing: -0.01em;
}
.prod-card-body p {
  color: var(--text-secondary);
  font-size: 0.92rem;
  line-height: 1.6;
  flex: 1;
  margin-bottom: 1rem;
}
.prod-card-highlight {
  font-size: 0.82rem;
  color: var(--accent);
  font-weight: 500;
  margin-bottom: 1.25rem;
  font-family: var(--mono);
}
.prod-card-link {
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--text-primary);
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
  transition: color 0.15s, gap 0.15s;
}
.prod-card-link:hover {
  color: var(--accent);
  gap: 0.6rem;
}

/* ─── CTA Strip ─────────────────────────────────────────────────────────── */
.prod-cta {
  padding: 5rem 0;
  text-align: center;
  border-top: 1px solid var(--border);
}
.prod-cta h2 {
  font-size: clamp(1.5rem, 3vw, 2.2rem);
  font-weight: 700;
  margin-bottom: 0.75rem;
}
.prod-cta p {
  color: var(--text-secondary);
  margin-bottom: 2rem;
}

/* ─── Responsive ────────────────────────────────────────────────────────── */
@media (max-width: 900px) {
  .prod-grid-top { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 600px) {
  .prod-grid-top,
  .prod-grid-bottom { grid-template-columns: 1fr; }
}
