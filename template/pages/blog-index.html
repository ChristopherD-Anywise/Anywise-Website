<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title><!-- REPLACE: Blog name e.g. "any.news" --> — <!-- REPLACE: Brand name --></title>
  <link rel="preconnect" href="https://api.fontshare.com">
  <link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../brand.css">
  <link rel="stylesheet" href="../shared.css">
  <style>
/* ─── Blog Home ─────────────────────────────────────────────────────────── */
.blog-hero {
  padding: 7rem 0 4rem;
}
.blog-hero h1 {
  font-size: clamp(2.5rem, 6vw, 4.5rem);
  font-weight: 700;
  letter-spacing: -0.03em;
  line-height: 1;
  margin: 0.5rem 0 1rem;
}
.blog-hero h1 span {
  color: var(--accent);
}
.blog-hero p {
  color: var(--text-secondary);
  font-size: 1.05rem;
  max-width: 520px;
}

/* ─── Post List ─────────────────────────────────────────────────────────── */
.blog-list-section {
  padding: 2rem 0 6rem;
  border-top: 1px solid var(--border);
}
.blog-list {
  display: flex;
  flex-direction: column;
  gap: 0;
}
.blog-post-item {
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: 2rem;
  align-items: start;
  padding: 2.5rem 0;
  border-bottom: 1px solid var(--border);
  text-decoration: none;
  color: inherit;
  transition: opacity 0.15s;
}
.blog-post-item:first-child {
  padding-top: 0;
}
.blog-post-item:hover { opacity: 0.75; }
.blog-post-item:hover .post-title { color: var(--accent); }

.post-thumb {
  aspect-ratio: 4/3;
  background: var(--bg-elevated);
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  flex-shrink: 0;
}
.post-thumb-placeholder {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}
.post-thumb-placeholder svg {
  width: 32px;
  height: 32px;
  opacity: 0.15;
}
.post-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: var(--radius);
}

.post-meta {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-bottom: 0.6rem;
  flex-wrap: wrap;
}
.post-date {
  font-size: 0.78rem;
  color: var(--text-tertiary);
  font-family: var(--mono);
}
.post-sep {
  color: var(--text-tertiary);
  font-size: 0.7rem;
}
.post-cat {
  font-size: 0.72rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--accent);
}
.post-read-time {
  font-size: 0.78rem;
  color: var(--text-tertiary);
}
.post-title {
  font-size: 1.2rem;
  font-weight: 700;
  line-height: 1.3;
  letter-spacing: -0.01em;
  margin-bottom: 0.6rem;
  transition: color 0.15s;
}
.post-excerpt {
  font-size: 0.92rem;
  color: var(--text-secondary);
  line-height: 1.65;
}

/* ─── Empty / Error state ───────────────────────────────────────────────── */
.blog-empty {
  padding: 4rem 0;
  text-align: center;
  color: var(--text-secondary);
}
.blog-empty p { margin-bottom: 1rem; }

/* ─── Responsive ────────────────────────────────────────────────────────── */
@media (max-width: 640px) {
  .blog-post-item {
    grid-template-columns: 1fr;
    gap: 1rem;
  }
  .post-thumb { max-width: 100%; aspect-ratio: 16/9; }
}
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav id="nav">
    <div class="container" style="display:flex;align-items:center;justify-content:space-between;padding-top:1rem;padding-bottom:1rem;">
      <a href="home.html" class="nav-brand"><!-- REPLACE: Brand name --><span><!-- REPLACE: Accent --></span></a>
      <ul id="navLinks" class="nav-links">
        <li><a href="product-index.html"><!-- REPLACE: Nav link 1 --></a></li>
        <li><a href="blog-index.html"><!-- REPLACE: Nav link 2 --></a></li>
        <li><a href="#" data-engage>Engage Us</a></li>
      </ul>
      <div style="display:flex;align-items:center;gap:0.75rem;">
        <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">◑</button>
        <a href="#" class="nav-cta" data-engage><!-- REPLACE: CTA label --></a>
        <button id="mobileToggle" class="mobile-toggle" aria-label="Toggle menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <section class="blog-hero">
    <div class="container">
      <div class="breadcrumb reveal">
        <span><a href="home.html" style="color:var(--text-tertiary);text-decoration:none;">Home</a></span>
        <span><!-- REPLACE: Section name e.g. "Insights" --></span>
      </div>
      <span class="label reveal"><!-- REPLACE: Blog section label --></span>
      <h1 class="reveal"><!-- REPLACE: Blog name e.g. "any<span>.</span>news" --></h1>
      <p class="reveal"><!-- REPLACE: Blog tagline --></p>
    </div>
  </section>

  <!-- Post list — rendered by inline JS -->
  <section class="blog-list-section">
    <div class="container">
      <div class="blog-list" id="blogList" role="list">
        <!-- Posts injected here by JS -->
      </div>
      <div class="blog-empty" id="blogEmpty" hidden>
        <p>No posts available at the moment.</p>
        <a href="home.html" class="btn btn-ghost">Back to home</a>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer style="padding:4rem 0 2rem;border-top:1px solid var(--border);margin-top:4rem;">
    <div class="container">
      <div class="footer-grid">
        <div class="footer-brand">
          <a href="home.html" class="nav-brand" style="display:inline-block;margin-bottom:0.75rem;"><!-- REPLACE: Brand name --><span><!-- REPLACE: Accent --></span></a>
          <p style="font-size:0.875rem;color:var(--text-secondary);max-width:280px;"><!-- REPLACE: Brand tagline --></p>
        </div>
        <div class="footer-col">
          <h4 style="font-size:0.8rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-tertiary);margin-bottom:1rem;"><!-- REPLACE: Column heading --></h4>
          <ul class="footer-links">
            <li><a href="product-index.html"><!-- REPLACE: Footer link --></a></li>
            <li><a href="blog-index.html"><!-- REPLACE: Footer link --></a></li>
          </ul>
        </div>
        <div class="footer-col">
          <h4 style="font-size:0.8rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-tertiary);margin-bottom:1rem;"><!-- REPLACE: Column heading --></h4>
          <ul class="footer-links">
            <li><a href="#" data-engage><!-- REPLACE: Footer link --></a></li>
          </ul>
        </div>
      </div>
      <div class="footer-bottom">
        <p class="footer-legal"><!-- REPLACE: Legal line --></p>
        <p class="footer-locations"><!-- REPLACE: Cities --></p>
        <p class="acknowledgement"><!-- REPLACE: Acknowledgement of Country --></p>
        <p style="font-size:0.8rem;color:var(--text-tertiary);margin-top:1rem;">© <!-- REPLACE: Year --> <!-- REPLACE: Company name -->. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="../shared.js"></script>
  <script>
(function() {
  const list = document.getElementById('blogList');
  const empty = document.getElementById('blogEmpty');

  function formatDate(iso) {
    const d = new Date(iso + 'T00:00:00');
    return d.toLocaleDateString('en-AU', { day: 'numeric', month: 'long', year: 'numeric' });
  }

  function truncate(str, len) {
    if (!str) return '';
    return str.length > len ? str.slice(0, len).trimEnd() + '…' : str;
  }

  function thumbSVG() {
    return `<div class="post-thumb-placeholder">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <path d="M21 15l-5-5L5 21"/>
      </svg>
    </div>`;
  }

  fetch('posts.json')
    .then(function(r) {
      if (!r.ok) throw new Error('Failed to load');
      return r.json();
    })
    .then(function(posts) {
      if (!posts || !posts.length) {
        empty.hidden = false;
        return;
      }

      /* Sort newest first */
      posts.sort(function(a, b) { return b.date.localeCompare(a.date); });

      posts.forEach(function(post) {
        const excerpt = truncate(post.intro, 160);
        const dateStr = formatDate(post.date);
        const thumb = post.heroImage
          ? `<img src="${post.heroImage}" alt="" loading="lazy">`
          : thumbSVG();

        const item = document.createElement('a');
        item.href = 'post.html?slug=' + encodeURIComponent(post.slug);
        item.className = 'blog-post-item reveal';
        item.setAttribute('role', 'listitem');
        item.innerHTML = `
          <div class="post-thumb">${thumb}</div>
          <div class="post-body">
            <div class="post-meta">
              <span class="post-date">${dateStr}</span>
              <span class="post-sep">·</span>
              <span class="post-cat">${post.category}</span>
              <span class="post-sep">·</span>
              <span class="post-read-time">${post.readTime} min read</span>
            </div>
            <div class="post-title">${post.title}</div>
            <p class="post-excerpt">${excerpt}</p>
          </div>
        `;
        list.appendChild(item);
      });

      /* Re-trigger reveal observer for dynamically added elements */
      if ('IntersectionObserver' in window) {
        const obs = new IntersectionObserver(function(entries) {
          entries.forEach(function(e) {
            if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }
          });
        }, { threshold: 0.05 });
        list.querySelectorAll('.reveal').forEach(function(el) { obs.observe(el); });
      } else {
        list.querySelectorAll('.reveal').forEach(function(el) { el.classList.add('visible'); });
      }
    })
    .catch(function() {
      empty.hidden = false;
    });
})();
  </script>
</body>
</html>
