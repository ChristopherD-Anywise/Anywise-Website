/* ─── Product Page Layout ───────────────────────────────────────────────── */
.prod-page { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem; }

/* ─── Hero ──────────────────────────────────────────────────────────────── */
.prod-hero {
  padding: 7rem 0 5rem;
}
.prod-hero-inner {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4rem;
  align-items: center;
}
.prod-hero-content .prod-tag {
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--accent);
  margin-bottom: 0.75rem;
}
.prod-hero-content h1 {
  font-size: clamp(2.2rem, 4vw, 3.2rem);
  font-weight: 700;
  line-height: 1.1;
  letter-spacing: -0.02em;
  margin-bottom: 0.75rem;
}
.prod-hero-content .prod-tagline {
  font-size: 1.15rem;
  color: var(--text-secondary);
  line-height: 1.65;
  margin-bottom: 2rem;
}
.prod-hero-actions {
  display: flex;
  gap: 1rem;
  flex-wrap: wrap;
}
.prod-hero-img {
  aspect-ratio: 4/3;
}

/* ─── Two-column sections ───────────────────────────────────────────────── */
.prod-section {
  padding: 5rem 0;
  border-top: 1px solid var(--border);
}
.prod-two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4rem;
  align-items: center;
}
/* Flip: image first, text second */
.prod-two-col.flip .prod-text { order: 2; }
.prod-two-col.flip .prod-visual { order: 1; }

.prod-section-label {
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--accent);
  margin-bottom: 0.75rem;
}
.prod-text h2 {
  font-size: clamp(1.6rem, 3vw, 2.2rem);
  font-weight: 700;
  line-height: 1.2;
  letter-spacing: -0.02em;
  margin-bottom: 1rem;
}
.prod-text p {
  color: var(--text-secondary);
  line-height: 1.75;
  margin-bottom: 1rem;
}
.prod-text p:last-child { margin-bottom: 0; }

.prod-img-16-9 { aspect-ratio: 16/9; }
.prod-img-4-3 { aspect-ratio: 4/3; }

/* ─── Benefits Grid ─────────────────────────────────────────────────────── */
.prod-benefits {
  padding: 5rem 0;
  border-top: 1px solid var(--border);
}
.prod-benefits-header {
  text-align: center;
  margin-bottom: 3rem;
}
.prod-benefits-header h2 {
  font-size: clamp(1.6rem, 3vw, 2.2rem);
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-top: 0.75rem;
}
.prod-benefits-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1.5rem;
}
.benefit-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.75rem 1.5rem;
}
.benefit-icon {
  width: 2.5rem;
  height: 2.5rem;
  background: var(--accent-muted);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 1rem;
  color: var(--accent);
}
.benefit-icon svg { width: 1.2rem; height: 1.2rem; }
.benefit-card h3 {
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 0.4rem;
}
.benefit-card p {
  font-size: 0.88rem;
  color: var(--text-secondary);
  line-height: 1.6;
}

/* ─── How it Works + Use Cases ──────────────────────────────────────────── */
.prod-how {
  padding: 5rem 0;
  border-top: 1px solid var(--border);
}
.prod-how-inner {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4rem;
}
.prod-steps { list-style: none; }
.prod-step {
  display: flex;
  gap: 1.25rem;
  margin-bottom: 2.5rem;
}
.prod-step:last-child { margin-bottom: 0; }
.step-num {
  flex-shrink: 0;
  width: 2rem;
  height: 2rem;
  background: var(--accent-muted);
  border: 1px solid var(--border-accent);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--accent);
  font-family: var(--mono);
  margin-top: 0.15rem;
}
.step-content h4 {
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 0.35rem;
}
.step-content p {
  font-size: 0.9rem;
  color: var(--text-secondary);
  line-height: 1.65;
}

.use-cases-list {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}
.use-case {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: var(--radius);
  padding: 1.25rem 1.5rem;
}
.use-case h4 {
  font-size: 0.95rem;
  font-weight: 600;
  margin-bottom: 0.3rem;
}
.use-case p {
  font-size: 0.88rem;
  color: var(--text-secondary);
  line-height: 1.6;
}

/* ─── Feature Breakdown ─────────────────────────────────────────────────── */
.prod-features {
  padding: 5rem 0;
  border-top: 1px solid var(--border);
}
.prod-feature-list {
  display: flex;
  flex-direction: column;
  gap: 1.25rem;
}
.feature-item {
  display: flex;
  gap: 1rem;
  align-items: flex-start;
}
.feature-check {
  flex-shrink: 0;
  width: 1.4rem;
  height: 1.4rem;
  background: var(--accent-muted);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 0.1rem;

}
.feature-check svg { width: 0.7rem; height: 0.7rem; }
.feature-item-content h4 {
  font-size: 0.95rem;
  font-weight: 600;
  margin-bottom: 0.25rem;
}
.feature-item-content p {
  font-size: 0.88rem;
  color: var(--text-secondary);
  line-height: 1.6;
}

/* ─── Product CTA ───────────────────────────────────────────────────────── */
.prod-final-cta {
  padding: 5rem 0;
  border-top: 1px solid var(--border);
  text-align: center;
}
.prod-final-cta h2 {

  margin-bottom: 0.75rem;
}
.prod-final-cta p {

  margin-bottom: 2rem;
}
.prod-final-cta-actions {
  display: flex;
  gap: 1rem;
  justify-content: center;
  flex-wrap: wrap;
}

/* ─── Responsive ────────────────────────────────────────────────────────── */
@media (max-width: 900px) {
  .prod-hero-inner,
  .prod-two-col,
  .prod-how-inner { grid-template-columns: 1fr; gap: 2.5rem; }
  .prod-two-col.flip .prod-text { order: unset; }
  .prod-two-col.flip .prod-visual { order: unset; }
  .prod-benefits-grid { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 600px) {
  .prod-benefits-grid { grid-template-columns: 1fr; }
  .prod-hero { padding: 5rem 0 3rem; }
}
