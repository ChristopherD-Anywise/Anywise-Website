<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engage Us Modal Mockup</title>
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'General Sans', sans-serif;
    background: #080c08;
    color: #f0f4f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Simulated page behind modal */
  .page-behind {
    position: fixed; inset: 0;
    background: #080c08;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 1rem;
    color: rgba(240,244,240,0.15);
    font-size: 1.5rem; font-weight: 700;
    user-select: none;
  }

  /* Modal overlay */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(4,8,4,0.85);
    backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    z-index: 50;
    padding: 1rem;
  }

  /* Modal panel */
  .modal {
    background: #0f140f;
    border: 1px solid rgba(74,222,128,0.2);
    border-radius: 20px;
    width: 100%; max-width: 620px;
    padding: 2.5rem;
    position: relative;
    box-shadow: 0 40px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(74,222,128,0.05);
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .modal-close {
    position: absolute; top: 1.25rem; right: 1.25rem;
    width: 2rem; height: 2rem;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: rgba(240,244,240,0.5);
    font-size: 1rem; line-height: 1;
    transition: all 0.15s;
  }
  .modal-close:hover { background: rgba(255,255,255,0.1); color: #f0f4f0; }

  .modal-label {
    font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em;
    color: #4ade80; font-weight: 600; margin-bottom: 0.5rem;
  }
  .modal h2 {
    font-size: 1.6rem; font-weight: 700; line-height: 1.2;
    margin-bottom: 0.5rem;
  }
  .modal-sub {
    font-size: 0.9rem; color: rgba(240,244,240,0.5);
    margin-bottom: 2rem; line-height: 1.5;
  }

  .form-row {
    display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;
    margin-bottom: 1rem;
  }
  .form-group { display: flex; flex-direction: column; gap: 0.35rem; }
  .form-group.full { grid-column: 1 / -1; }
  label {
    font-size: 0.78rem; font-weight: 500;
    color: rgba(240,244,240,0.6);
  }
  .form-input, .form-select, .form-textarea {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 0.65rem 0.875rem;
    color: #f0f4f0;
    font-family: inherit;
    font-size: 0.9rem;
    transition: border-color 0.15s;
    outline: none;
    width: 100%;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: rgba(74,222,128,0.4);
    background: rgba(74,222,128,0.03);
  }
  .form-input::placeholder, .form-textarea::placeholder { color: rgba(240,244,240,0.25); }
  .form-select option { background: #0f140f; }
  .form-textarea { resize: vertical; min-height: 100px; line-height: 1.5; }

  .modal-actions {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 1.5rem; gap: 1rem;
  }
  .modal-note {
    font-size: 0.78rem; color: rgba(240,244,240,0.35); line-height: 1.4;
  }
  .btn-submit {
    background: #4ade80; color: #080c08;
    font-weight: 700; font-family: inherit;
    padding: 0.75rem 1.75rem; border-radius: 8px;
    border: none; cursor: pointer; font-size: 0.95rem;
    white-space: nowrap; flex-shrink: 0;
    transition: opacity 0.15s;
  }
  .btn-submit:hover { opacity: 0.9; }
</style>
</head>
<body>

<!-- Page content behind modal -->
<div class="page-behind">
  <div>anywise.com.au</div>
  <div style="font-size:0.9rem; font-weight:400; opacity:0.5;">Main page content behind overlay</div>
</div>

<!-- Modal overlay -->
<div class="modal-overlay">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">

    <button class="modal-close" aria-label="Close">✕</button>

    <div class="modal-label">Get in touch</div>
    <h2 id="modal-title">Engage Us</h2>
    <p class="modal-sub">Tell us about your challenge. We'll get back to you within one business day.</p>

    <form>
      <div class="form-row">
        <div class="form-group">
          <label for="name">Full name</label>
          <input class="form-input" id="name" type="text" placeholder="Jane Smith" autocomplete="name">
        </div>
        <div class="form-group">
          <label for="email">Work email</label>
          <input class="form-input" id="email" type="email" placeholder="jane@organisation.gov.au" autocomplete="email">
        </div>
        <div class="form-group">
          <label for="org">Organisation</label>
          <input class="form-input" id="org" type="text" placeholder="Department / Company">
        </div>
        <div class="form-group">
          <label for="role">Your role</label>
          <input class="form-input" id="role" type="text" placeholder="e.g. CTO, Project Manager">
        </div>
        <div class="form-group full">
          <label for="enquiry">What are you looking for?</label>
          <select class="form-select" id="enquiry">
            <option value="" disabled selected>Select one...</option>
            <option>Product enquiry</option>
            <option>Partnership or collaboration</option>
            <option>General enquiry</option>
          </select>
        </div>
        <div class="form-group full">
          <label for="message">Message</label>
          <textarea class="form-textarea" id="message" placeholder="Tell us about your challenge, context, or what you'd like to explore with Anywise..."></textarea>
        </div>
      </div>

      <div class="modal-actions">
        <p class="modal-note">We respect your privacy. Your details are never shared with third parties.</p>
        <button type="submit" class="btn-submit">Send →</button>
      </div>
    </form>

  </div>
</div>

</body>
</html>
