                          - listitem [ref=e138]: ·Oct 3, 2024
                          - listitem [ref=e139]: ·3 min read
                        - button "More actions" [ref=e141] [cursor=pointer]:
                          - img [ref=e142]
                    - paragraph [ref=e144]: "Updated: Dec 16, 2025"
                  - generic [ref=e151]:
                    - paragraph [ref=e156]:
                      - generic [ref=e157]: At Anywise, we are on an exciting path of continuous improvement. As we work towards recertifying our B-Corp status, we are also actively pursuing ISO certifications for 9001, 45001, 14001, and 27001. These certifications represent our commitment to ethical business practices, ensuring quality, safeguarding employee well-being, protecting data, and minimising our environmental impact.
                    - 'heading "Working Towards B-Corp Recertification: A Purpose-Driven Business" [level=2] [ref=e159]':
                      - generic [ref=e160]: "Working Towards B-Corp Recertification: A Purpose-Driven Business"
                    - paragraph [ref=e162]:
                      - generic [ref=e163]: B-Corp certification represents the highest standards of social and environmental responsibility, and we are committed to maintaining this esteemed status. Our recertification process is a thorough review of how we continue to positively impact all stakeholders, with a strong focus on ethical governance, community engagement, and sustainability.
                    - paragraph [ref=e165]:
                      - generic [ref=e166]: This certification goes beyond recognition—it forms the foundation of our decision-making processes. As we work through the recertification, we reaffirm our commitment to responsible sourcing, diversity and inclusion, and environmental stewardship. Each step towards recertification enhances our resolve to deliver positive outcomes for the world around us.
                    - 'heading "ISO Certifications: Building a Framework for Quality, Safety, Security, and Sustainability" [level=4] [ref=e168]':
                      - generic [ref=e169]: "ISO Certifications: Building a Framework for Quality, Safety, Security, and Sustainability"
                    - paragraph [ref=e171]:
                      - generic [ref=e172]: "In tandem with our B-Corp recertification efforts, we are working towards achieving ISO certifications in four key areas:"
                    - list [ref=e174]:
                      - listitem [level=1] [ref=e175]:
                        - paragraph [ref=e176]:
                          - generic [ref=e177]:
                            - strong [ref=e178]: ISO 9001 (Quality Management System)
                            - text: ": We are dedicated to consistently meeting customer expectations and regulatory requirements. Working towards ISO 9001 certification ensures that we are developing a robust framework to continuously improve quality, ensure customer satisfaction, and deliver services through a process-driven approach."
                      - listitem [level=1] [ref=e179]:
                        - paragraph [ref=e180]:
                          - generic [ref=e181]:
                            - strong [ref=e182]: ISO 45001 (Occupational Health and Safety Management System)
                            - text: ": Ensuring the health and safety of our employees is paramount. Pursuing ISO 45001 certification reflects our commitment to implementing effective processes that help us proactively manage workplace risks, foster a safer working environment, and promote the overall well-being of our team."
                      - listitem [level=1] [ref=e183]:
                        - paragraph [ref=e184]:
                          - generic [ref=e185]:
                            - strong [ref=e186]: ISO 14001 (Environmental Management System)
                            - text: ": Sustainability is a core value at Anywise. By working towards ISO 14001 certification, we are formalising our environmental practices to reduce our ecological footprint, minimise waste, and ensure responsible resource management. This aligns perfectly with our broader sustainability goals and B-Corp values, reinforcing our dedication to environmental responsibility."
                      - listitem [level=1] [ref=e187]:
                        - paragraph [ref=e188]:
                          - generic [ref=e189]:
                            - strong [ref=e190]: ISO 27001 (Information Security Management System)
                            - text: ": In today’s digital world, safeguarding sensitive information is critical. As we work towards ISO 27001 certification, we are establishing a rigorous information security framework to protect our data and that of our clients. This certification demonstrates our commitment to ensuring data privacy and security in an increasingly interconnected world."
                    - figure [ref=e197]:
                      - generic [ref=e198]:
                        - button "Expand image":
                          - img
                    - paragraph [ref=e202]:
                      - emphasis [ref=e204]:
                        - generic [ref=e205]: "Caption: an unnamed artist's impression of how ethical and sustainable businesses of the future may look. Perhaps we should invite them around to the Anywise office to show them what it looks like in real life..."
                    - heading "A Unified Approach to Responsible Business" [level=4] [ref=e210]:
                      - generic [ref=e211]: A Unified Approach to Responsible Business
                    - paragraph [ref=e213]:
                      - generic [ref=e214]: Our pursuit of both B-Corp recertification and multiple ISO certifications demonstrates our holistic approach to responsible and sustainable business. While B-Corp focuses on social and environmental impact, ISO standards provide structured frameworks for quality, safety, environmental, and information security management. Together, these certifications strengthen our ability to deliver ethical, high-quality services while prioritising the well-being of people, the environment, and our data security.
                    - heading "Looking Ahead" [level=4] [ref=e216]:
                      - generic [ref=e217]: Looking Ahead
                    - paragraph [ref=e219]:
                      - generic [ref=e220]: As we continue working towards these certifications, we remain committed to the principle of continuous improvement. Achieving these certifications is not just about compliance—it’s about embodying excellence in every aspect of our operations. By aligning with both B-Corp and ISO standards, we are setting ourselves up for long-term success and demonstrating our role as a responsible, forward-thinking partner.
                    - paragraph [ref=e222]:
                      - generic [ref=e223]: Looking to the future, our dedication to ethical, sustainable, and quality-driven practices will only grow stronger. These certifications reaffirm our commitment to building a business that positively impacts people, protects the planet, upholds data security, and consistently delivers the highest standards of excellence.
