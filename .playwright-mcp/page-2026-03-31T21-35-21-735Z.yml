                      - heading "Strengthening Our Commitment to Ethical, Sustainable, and Quality-Driven Business" [level=1] [ref=e130]
                      - generic [ref=e131]:
                        - list [ref=e132]:
                          - listitem [ref=e133]:
                            - 'img "Writer: Adam Evans" [ref=e136]'
                            - link "Adam Evans" [ref=e137] [cursor=pointer]:
