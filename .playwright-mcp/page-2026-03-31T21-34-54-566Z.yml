                        - paragraph [ref=e393]:
                          - generic [ref=e394]: Engineering and logistics overlays
                      - listitem [level=1] [ref=e397]:
                        - paragraph [ref=e398]:
                          - generic [ref=e399]: Smart camp and fuel monitoring
                      - listitem [level=1] [ref=e402]:
                        - paragraph [ref=e403]:
                          - generic [ref=e404]: Low‑power fire detection mesh networks
                      - listitem [level=1] [ref=e407]:
                        - paragraph [ref=e408]:
                          - generic [ref=e409]: Infrastructure planning & reporting tools
                    - paragraph [ref=e414]:
                      - generic [ref=e415]: All designed to give decision‑makers clarity over complexity.
                    - heading "Closing Thought" [level=2] [ref=e420]:
                      - generic [ref=e421]: Closing Thought
                    - paragraph [ref=e423]:
                      - generic [ref=e424]: The future of deployable infrastructure, whether for military operations or civilian response, isn’t about bigger systems. This approach encourages organisations to rethink how they manage equipment and plan operations, focusing on data quality and human-machine collaboration.
